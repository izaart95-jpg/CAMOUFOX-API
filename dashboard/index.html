<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>reCAPTCHA Harvester Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; color: #e0e0e0; font-family: system-ui, sans-serif; padding: 24px; }
    h1 { font-size: 24px; font-weight: 700; color: #fff; margin-bottom: 4px; }
    .subtitle { color: #6b7280; font-size: 14px; margin-bottom: 24px; }
    
    .stats { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-card { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 12px; padding: 20px; flex: 1; min-width: 150px; }
    .stat-label { font-size: 12px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 32px; font-weight: 700; color: #4ade80; margin-top: 8px; }
    
    .controls { background: #111827; border: 1px solid #1f2937; border-radius: 8px; padding: 16px; margin-bottom: 24px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.8; }
    .btn-danger { background: #7f1d1d; color: #f87171; border: 1px solid #991b1b; }
    
    .tokens-table { background: #1a1a2e; border: 1px solid #2d2d4e; border-radius: 12px; overflow: hidden; }
    .table-header { display: grid; grid-template-columns: 80px 100px 120px 1fr 200px; background: #111827; padding: 12px 16px; font-size: 12px; color: #9ca3af; font-weight: 600; }
    .token-row { display: grid; grid-template-columns: 80px 100px 120px 1fr 200px; padding: 12px 16px; border-top: 1px solid #2d2d4e; font-size: 12px; align-items: center; }
    .token-row:hover { background: #1f1f33; }
    .token-preview { font-family: monospace; color: #60a5fa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .version-badge { padding: 2px 8px; border-radius: 12px; display: inline-block; font-size: 11px; font-weight: 600; }
    .version-v2 { background: #2a1c1c; color: #f87171; border: 1px solid #991b1b; }
    .version-v3 { background: #1c1c2a; color: #60a5fa; border: 1px solid #1d4ed8; }
    
    .refresh-info { margin-top: 16px; color: #4b5563; font-size: 11px; text-align: right; }
  </style>
</head>
<body>
  <h1>🎯 reCAPTCHA Harvester Dashboard</h1>
  <p class="subtitle">Server running at http://localhost:3000</p>
  
  <div class="stats" id="stats">
    <div class="stat-card"><div class="stat-label">Total Tokens</div><div class="stat-value" id="stat-total">0</div></div>
    <div class="stat-card"><div class="stat-label">v2 Tokens</div><div class="stat-value" id="stat-v2">0</div></div>
    <div class="stat-card"><div class="stat-label">v3 Tokens</div><div class="stat-value" id="stat-v3">0</div></div>
    <div class="stat-card"><div class="stat-label">Fresh (&lt;2min)</div><div class="stat-value" id="stat-fresh">0</div></div>
  </div>
  
  <div class="controls">
    <button class="btn btn-danger" onclick="clearTokens()">🗑 Clear All Tokens</button>
  </div>
  
  <div class="tokens-table">
    <div class="table-header">
      <div>Time</div>
      <div>Version</div>
      <div>Action</div>
      <div>Token Preview</div>
      <div>Tab ID</div>
    </div>
    <div id="tokens-list">
      <p style="color:#6b7280; padding:20px; text-align:center;">Loading tokens...</p>
    </div>
  </div>
  
  <div class="refresh-info" id="refresh-info">Last refresh: —</div>
  
  <script>
    async function loadData() {
      try {
        const [tokensRes, statsRes] = await Promise.all([
          fetch('/api/tokens'),
          fetch('/api/stats')
        ]);
        
        const tokensData = await tokensRes.json();
        const stats = await statsRes.json();
        
        // Update stats
        document.getElementById('stat-total').textContent = stats.total;
        document.getElementById('stat-v2').textContent = stats.v2;
        document.getElementById('stat-v3').textContent = stats.v3;
        document.getElementById('stat-fresh').textContent = stats.fresh;
        
        // Render tokens
        const tokens = tokensData.tokens || [];
        const listEl = document.getElementById('tokens-list');
        
        if (tokens.length === 0) {
          listEl.innerHTML = '<p style="color:#6b7280; padding:20px; text-align:center;">No tokens yet</p>';
        } else {
          listEl.innerHTML = tokens.slice().reverse().slice(0, 50).map(token => {
            const time = new Date(token.timestamp_utc).toLocaleTimeString();
            const version = token.version || 'unknown';
            const versionClass = version.includes('v2') ? 'version-v2' : 'version-v3';
            
            return `
              <div class="token-row">
                <div>${time}</div>
                <div><span class="version-badge ${versionClass}">${version}</span></div>
                <div>${token.action || '-'}</div>
                <div class="token-preview" title="${token.token}">${token.token_preview || token.token.substring(0, 40) + '...'}</div>
                <div>${token.tabId !== undefined ? token.tabId : '-'}</div>
              </div>
            `;
          }).join('');
        }
        
        document.getElementById('refresh-info').textContent = 'Last refresh: ' + new Date().toLocaleTimeString();
      } catch (e) {
        console.error('Failed to load data:', e);
        document.getElementById('tokens-list').innerHTML = '<p style="color:#f87171; padding:20px; text-align:center;">Error loading tokens. Is the server running?</p>';
      }
    }
    
    async function clearTokens() {
      if (!confirm('Clear all tokens? This cannot be undone.')) return;
      
      try {
        const res = await fetch('/api/tokens', { method: 'DELETE' });
        const data = await res.json();
        
        if (data.success) {
          alert(`Cleared ${data.removed} token(s)`);
          loadData();
        }
      } catch (e) {
        alert('Error clearing tokens: ' + e.message);
      }
    }
    
    // Auto-refresh
    loadData();
    setInterval(loadData, 3000);
  </script>
</body>
</html>
